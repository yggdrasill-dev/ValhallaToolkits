name: Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BuildConfiguration: debug
  NugetSource: Valhalla-PS
  NugetSourceUrl: https://www.myget.org/F/valhalla-ps/api/v3/index.json

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Run Pester tests
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester | Where-Object Version -ge '5.0.0')) {
            Install-Module Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -SkipPublisherCheck
          }

          $config = New-PesterConfiguration
          $config.Run.Path = '.\Tests'
          $config.Run.PassThru = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'testResults.xml'
          $config.Output.Verbosity = 'Detailed'

          $result = Invoke-Pester -Configuration $config

          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester test(s) failed."
          }

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pester 測試結果
          path: testResults.xml
          reporter: java-junit
          list-suites: all
          list-tests: all
          fail-on-error: true

      - name: Upload raw test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results
          path: testResults.xml

  publish:
    needs: test
    if: github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Push powershell module
        shell: pwsh
        env:
          DOTNET_CLI_UI_LANGUAGE: en_US
        run: |
          if (-not (Get-Module -ListAvailable Microsoft.PowerShell.PSResourceGet)) {
            Install-Module Microsoft.PowerShell.PSResourceGet -Force -Scope CurrentUser -SkipPublisherCheck
          }

          if (-not (Get-PSResourceRepository -Name $env:NugetSource -ErrorAction SilentlyContinue)) {
            Register-PSResourceRepository -Name $env:NugetSource -Uri $env:NugetSourceUrl -Trusted
          }

          Publish-PSResource -Path .\ValhallaToolkits -Repository $env:NugetSource -ApiKey ${{ secrets.NUGETAPIKEY }}
